<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet2Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1923"/>
      <stop offset="100%" stop-color="#050A10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes orbitA {
        from { transform: rotate(0deg) translateX(72px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(72px) rotate(-360deg); }
      }
      @keyframes orbitB {
        from { transform: rotate(120deg) translateX(110px) rotate(-120deg); }
        to   { transform: rotate(480deg) translateX(110px) rotate(-480deg); }
      }
      @keyframes orbitC {
        from { transform: rotate(240deg) translateX(55px) rotate(-240deg); }
        to   { transform: rotate(600deg) translateX(55px) rotate(-600deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.9; }
      }
      .dot-a { animation: orbitA 8s linear infinite; transform-origin: 680px 100px; }
      .dot-b { animation: orbitB 14s linear infinite; transform-origin: 680px 100px; }
      .dot-c { animation: orbitC 5s linear infinite; transform-origin: 680px 100px; }
      .planet-pulse { animation: pulse 4s ease-in-out infinite; }
      .star1 { animation: twinkle 3s ease-in-out infinite; }
      .star2 { animation: twinkle 4.5s ease-in-out infinite 1s; }
      .star3 { animation: twinkle 2.8s ease-in-out infinite 0.5s; }
      .star4 { animation: twinkle 5s ease-in-out infinite 2s; }
      .star5 { animation: twinkle 3.5s ease-in-out infinite 1.5s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="8"/>

  <!-- Stars scattered -->
  <circle class="star1" cx="40" cy="25" r="1.2" fill="#94A3B8"/>
  <circle class="star2" cx="120" cy="60" r="0.8" fill="#CBD5E1"/>
  <circle class="star3" cx="200" cy="15" r="1.5" fill="#94A3B8"/>
  <circle class="star4" cx="310" cy="45" r="0.9" fill="#CBD5E1"/>
  <circle class="star5" cx="85" cy="140" r="1.1" fill="#94A3B8"/>
  <circle class="star1" cx="460" cy="30" r="0.8" fill="#CBD5E1"/>
  <circle class="star2" cx="530" cy="170" r="1.3" fill="#94A3B8"/>
  <circle class="star3" cx="350" cy="160" r="0.7" fill="#CBD5E1"/>
  <circle class="star4" cx="780" cy="165" r="1.0" fill="#94A3B8"/>
  <circle class="star5" cx="820" cy="30" r="1.4" fill="#CBD5E1"/>
  <circle class="star1" cx="855" cy="140" r="0.8" fill="#94A3B8"/>
  <circle class="star2" cx="170" cy="180" r="1.2" fill="#CBD5E1"/>
  <circle class="star3" cx="620" cy="18" r="0.9" fill="#94A3B8"/>

  <!-- Orbital rings (ellipses around main planet) -->
  <ellipse cx="680" cy="100" rx="110" ry="35" fill="none" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="4 6"/>
  <ellipse cx="680" cy="100" rx="72" ry="22" fill="none" stroke="#7DD3FC" stroke-width="0.4" stroke-opacity="0.3" stroke-dasharray="3 5"/>
  <ellipse cx="680" cy="100" rx="55" ry="16" fill="none" stroke="#38BDF8" stroke-width="0.4" stroke-opacity="0.2" stroke-dasharray="2 8"/>

  <!-- Vertical orbital line (like Comet UI) -->
  <line x1="680" y1="10" x2="680" y2="190" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="570" y1="100" x2="790" y2="100" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Main planet glow halo -->
  <circle cx="680" cy="100" r="42" fill="url(#planetGlow)" class="planet-pulse"/>

  <!-- Main planet body -->
  <circle cx="680" cy="100" r="26" fill="#1E3A5F" filter="url(#softGlow)"/>
  <circle cx="680" cy="100" r="26" fill="none" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.8"/>
  <!-- Planet surface detail -->
  <circle cx="672" cy="93" r="7" fill="#2563EB" fill-opacity="0.3"/>
  <circle cx="686" cy="107" r="5" fill="#0EA5E9" fill-opacity="0.2"/>

  <!-- Orbiting satellites/dots -->
  <g class="dot-a">
    <circle cx="680" cy="100" r="4" fill="#7DD3FC" filter="url(#glow)"/>
  </g>
  <g class="dot-b">
    <circle cx="680" cy="100" r="3" fill="#38BDF8" filter="url(#glow)" fill-opacity="0.8"/>
  </g>
  <g class="dot-c">
    <circle cx="680" cy="100" r="2.5" fill="#BAE6FD" filter="url(#glow)"/>
  </g>

  <!-- Small distant planet top-right -->
  <circle cx="810" cy="45" r="10" fill="#1E293B"/>
  <circle cx="810" cy="45" r="10" fill="none" stroke="#64748B" stroke-width="0.8" stroke-opacity="0.6"/>
  <circle cx="810" cy="45" r="4" fill="url(#planet2Glow)"/>

  <!-- Text block -->
  <text x="60" y="72" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#38BDF8" fill-opacity="0.7" letter-spacing="3">AEROSPACE · AUTONOMY · MULTI-ROBOT</text>
  <text x="60" y="115" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="700" font-size="32" fill="#F0F9FF" letter-spacing="1">SIDHANT JHA</text>
  <text x="63" y="145" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#94A3B8" letter-spacing="1">UIUC · ACRL · AVIATE · PROJECT LUMYN</text>

  <!-- Subtle bottom border accent -->
  <line x1="60" y1="162" x2="500" y2="162" stroke="#38BDF8" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="60" y1="162" x2="120" y2="162" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.9"/>
</svg>
