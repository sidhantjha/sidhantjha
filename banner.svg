<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planet1grad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="planet2grad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="planet3grad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="fsharp">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <style>
      @keyframes orb1 {
        from { transform: rotate(0deg) translateX(52px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(52px) rotate(-360deg); }
      }
      @keyframes orb2 {
        from { transform: rotate(200deg) translateX(80px) rotate(-200deg); }
        to   { transform: rotate(560deg) translateX(80px) rotate(-560deg); }
      }
      @keyframes orb3 {
        from { transform: rotate(90deg) translateX(30px) rotate(-90deg); }
        to   { transform: rotate(450deg) translateX(30px) rotate(-450deg); }
      }
      @keyframes orb4 {
        from { transform: rotate(300deg) translateX(22px) rotate(-300deg); }
        to   { transform: rotate(660deg) translateX(22px) rotate(-660deg); }
      }
      @keyframes pulse1 { 0%,100%{opacity:0.7} 50%{opacity:1} }
      @keyframes pulse2 { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
      @keyframes tw { 0%,100%{opacity:0.15} 50%{opacity:1} }
      .o1 { animation: orb1 9s linear infinite; transform-origin: 980px 80px; }
      .o2 { animation: orb2 16s linear infinite; transform-origin: 980px 80px; }
      .o3 { animation: orb3 6s linear infinite; transform-origin: 1100px 48px; }
      .o4 { animation: orb4 4.5s linear infinite; transform-origin: 1100px 48px; }
      .p1 { animation: pulse1 5s ease-in-out infinite; }
      .p2 { animation: pulse2 7s ease-in-out infinite 1s; }
      .t1 { animation: tw 2.5s ease-in-out infinite; }
      .t2 { animation: tw 3.8s ease-in-out infinite 0.7s; }
      .t3 { animation: tw 4.5s ease-in-out infinite 1.4s; }
      .t4 { animation: tw 2.9s ease-in-out infinite 2.1s; }
      .t5 { animation: tw 5.2s ease-in-out infinite 0.3s; }
      .t6 { animation: tw 3.1s ease-in-out infinite 1.8s; }
    </style>
  </defs>

  <!-- Pure black background -->
  <rect width="1200" height="160" fill="#000000"/>

  <!-- Subtle HUD grid -->
  <line x1="0" y1="40"  x2="1200" y2="40"  stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
  <line x1="0" y1="80"  x2="1200" y2="80"  stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="160" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="160" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="160" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>

  <!-- Stars -->
  <circle class="t1" cx="30"  cy="12"  r="1.1" fill="#CBD5E1"/>
  <circle class="t2" cx="78"  cy="55"  r="0.8" fill="#94A3B8"/>
  <circle class="t3" cx="155" cy="20"  r="1.3" fill="#E2E8F0"/>
  <circle class="t4" cx="210" cy="90"  r="0.7" fill="#94A3B8"/>
  <circle class="t5" cx="260" cy="38"  r="1.0" fill="#CBD5E1"/>
  <circle class="t6" cx="340" cy="130" r="0.9" fill="#94A3B8"/>
  <circle class="t1" cx="390" cy="15"  r="1.2" fill="#E2E8F0"/>
  <circle class="t2" cx="430" cy="70"  r="0.7" fill="#94A3B8"/>
  <circle class="t3" cx="500" cy="140" r="1.1" fill="#CBD5E1"/>
  <circle class="t4" cx="545" cy="28"  r="0.8" fill="#94A3B8"/>
  <circle class="t5" cx="610" cy="105" r="1.4" fill="#E2E8F0"/>
  <circle class="t6" cx="655" cy="50"  r="0.6" fill="#94A3B8"/>
  <circle class="t1" cx="700" cy="135" r="1.0" fill="#CBD5E1"/>
  <circle class="t2" cx="740" cy="22"  r="1.2" fill="#94A3B8"/>
  <circle class="t3" cx="800" cy="88"  r="0.8" fill="#E2E8F0"/>
  <circle class="t4" cx="850" cy="145" r="1.1" fill="#94A3B8"/>
  <circle class="t5" cx="870" cy="10"  r="0.9" fill="#CBD5E1"/>
  <circle class="t6" cx="920" cy="60"  r="0.7" fill="#94A3B8"/>
  <circle class="t1" cx="1060" cy="130" r="1.0" fill="#CBD5E1"/>
  <circle class="t2" cx="1140" cy="20"  r="1.3" fill="#94A3B8"/>
  <circle class="t3" cx="1175" cy="100" r="0.8" fill="#E2E8F0"/>
  <circle class="t4" cx="45"   cy="140" r="0.9" fill="#94A3B8"/>
  <circle class="t5" cx="115"  cy="105" r="1.1" fill="#CBD5E1"/>
  <circle class="t6" cx="480"  cy="10"  r="0.7" fill="#94A3B8"/>

  <!-- MAIN PLANET -->
  <circle cx="980" cy="80" r="72" fill="url(#glow1)" class="p1"/>
  <ellipse cx="980" cy="80" rx="80" ry="20" fill="none" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="5 7" transform="rotate(-15, 980, 80)"/>
  <ellipse cx="980" cy="80" rx="55" ry="14" fill="none" stroke="#7DD3FC" stroke-width="0.4" stroke-opacity="0.25" stroke-dasharray="3 6" transform="rotate(10, 980, 80)"/>
  <circle cx="980" cy="80" r="38" fill="url(#planet1grad)"/>
  <ellipse cx="968" cy="68" rx="12" ry="6" fill="#1E40AF" fill-opacity="0.5" transform="rotate(-20,968,68)"/>
  <ellipse cx="990" cy="92" rx="8"  ry="4" fill="#1D4ED8" fill-opacity="0.4" transform="rotate(15,990,92)"/>
  <circle cx="975" cy="72" r="4" fill="#60A5FA" fill-opacity="0.3"/>
  <circle cx="980" cy="80" r="38" fill="none" stroke="#93C5FD" stroke-width="1" stroke-opacity="0.5"/>
  <g class="o1"><circle cx="980" cy="80" r="4.5" fill="#7DD3FC" filter="url(#fsharp)"/></g>
  <g class="o2"><circle cx="980" cy="80" r="3"   fill="#38BDF8" filter="url(#fsharp)" fill-opacity="0.9"/></g>

  <!-- SMALL PLANET top-right -->
  <circle cx="1100" cy="48" r="18" fill="url(#glow3)" class="p2"/>
  <circle cx="1100" cy="48" r="18" fill="url(#planet3grad)"/>
  <circle cx="1100" cy="48" r="18" fill="none" stroke="#C4B5FD" stroke-width="0.8" stroke-opacity="0.5"/>
  <ellipse cx="1100" cy="48" rx="26" ry="7" fill="none" stroke="#A78BFA" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="3 5" transform="rotate(-20,1100,48)"/>
  <g class="o3"><circle cx="1100" cy="48" r="2.5" fill="#C4B5FD" filter="url(#fsharp)"/></g>
  <g class="o4"><circle cx="1100" cy="48" r="2"   fill="#A78BFA" filter="url(#fsharp)"/></g>

  <!-- TINY distant planet -->
  <circle cx="855" cy="118" r="9" fill="url(#glow2)" fill-opacity="0.5"/>
  <circle cx="855" cy="118" r="9" fill="url(#planet2grad)"/>
  <circle cx="855" cy="118" r="9" fill="none" stroke="#67E8F9" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- Connector dashes between planets -->
  <line x1="873" y1="108" x2="942" y2="72" stroke="#38BDF8" stroke-width="0.4" stroke-opacity="0.15" stroke-dasharray="3 6"/>
  <line x1="1018" y1="58" x2="1082" y2="48" stroke="#A78BFA" stroke-width="0.4" stroke-opacity="0.15" stroke-dasharray="3 6"/>

  <!-- TEXT -->
  <text x="60" y="54"  font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38BDF8" fill-opacity="0.75" letter-spacing="4">AEROSPACE  ·  AUTONOMY  ·  MULTI-ROBOT</text>
  <text x="60" y="98"  font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="36" fill="#F0F9FF" letter-spacing="2">SIDHANT JHA</text>
  <text x="62" y="128" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#64748B" letter-spacing="2">UIUC  ·  ACRL  ·  AVIATE  ·  PROJECT LUMYN  ·  ROSSCOPE</text>

  <!-- Accent lines -->
  <line x1="60"  y1="108" x2="600" y2="108" stroke="#1E293B" stroke-width="1"/>
  <line x1="60"  y1="108" x2="160" y2="108" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="163" y1="108" x2="220" y2="108" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.3"/>
</svg>
